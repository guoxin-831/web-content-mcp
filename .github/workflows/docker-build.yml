name: Build and Push Docker Image to Aliyun ACR

# 当向 main 分支 push 代码，或者打 tag 时触发工作流
on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出仓库代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx 环境
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录阿里云容器镜像服务 (ACR)
      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      # 4. 构建并推送镜像至阿里云
      # 注意：请把下面的 gxyun 替换为你阿里云控制台真实的命名空间！
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/gxyun/web-content-fetcher:latest
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/gxyun/web-content-fetcher:v1.1